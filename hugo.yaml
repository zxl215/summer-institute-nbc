baseURL: "https://example.org/"
title: "第四届大鹏湾统计功能基因组学暑期课程"
theme: "hugo-book"

publishDir: "public"
relativeURLs: true
canonifyURLs: false
disablePathToLower: true
enableGitInfo: true
locale: "zh-CN"
defaultContentLanguage: "zh"
hasCJKLanguage: true

taxonomies:
  分类: "categories"
  标签: "tags"

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 1
    endLevel: 4
  highlight:
    style: github

menu:
  after:
    - name: "代码仓库"
      url: "https://github.com/StatFunGen/summer-institute-nbc"
      weight: 10
    - name: "主题模板"
      url: "https://themes.gohugo.io/themes/hugo-book/"
      weight: 20
    - name: "分类"
      url: "/categories/"
      weight: 30
    - name: "标签"
      url: "/tags/"
      weight: 40

params:
  BookTheme: "light"
  BookToC: true
  BookSection: "docs"
  BookRepo: "https://github.com/StatFunGen/summer-institute-nbc"
  BookEditLink: "{{ .Site.Params.BookRepo }}/edit/main/{{ .Path }}"
  BookLastChangeLink: "{{ .Site.Params.BookRepo }}/commit/{{ .GitInfo.Hash }}"
  BookDateFormat: "2006年1月2日"
  BookSearch: true
  BookComments: false
  BookPortableLinks: "warning"
  BookServiceWorker: false
