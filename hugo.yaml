baseURL: "https://example.org/"
title: "第四届大鹏湾统计功能基因组学暑期课程"
theme: "hugo-book"

publishDir: "public"
relativeURLs: true
uglyURLs: true
canonifyURLs: false
disablePathToLower: true
enableGitInfo: true
locale: "zh-CN"
defaultContentLanguage: "zh"
hasCJKLanguage: true

taxonomies:
  分类: "categories"
  标签: "tags"

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 1
    endLevel: 4
  highlight:
    style: github

menu:
  after:
    - name: "分类"
      pageRef: "/categories"
      weight: 10
    - name: "标签"
      pageRef: "/tags"
      weight: 20

params:
  BookTheme: "light"
  BookToC: true
  BookSection: "docs"
  BookDateFormat: "2006年1月2日"
  BookSearch: false
  BookComments: false
  BookPortableLinks: "warning"
  BookServiceWorker: false
