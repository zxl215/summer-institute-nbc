name: Build Hugo HTML

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "archetypes/**"
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "scripts/**"
      - "static/**"
      - "themes/**"
      - ".gitmodules"
      - "hugo.yaml"
      - ".github/workflows/build-html.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-hugo-html-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh -o /tmp/install-pixi.sh
          bash /tmp/install-pixi.sh
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Install Hugo
        run: pixi global install hugo

      - name: Check Hugo version
        run: hugo version

      - name: Build HTML
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --gc --minify --cleanDestinationDir --noTimes --noChmod --destination public

      - name: Generate student server redirects
        run: python3 scripts/generate_student_redirects.py --input data/course_students_urls.xlsx --output public

      - name: Commit generated HTML
        run: |
          if [ -n "$(git status --porcelain -- public)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public
            git commit -m "Build Hugo HTML [skip ci]"
            git push
          else
            echo "No generated HTML changes."
          fi
