name: Build Hugo HTML

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "archetypes/**"
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "scripts/**"
      - "static/**"
      - "themes/**"
      - ".gitmodules"
      - "hugo.yaml"
      - ".github/workflows/build-html.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-hugo-html-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh -o /tmp/install-pixi.sh
          bash /tmp/install-pixi.sh
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Install Hugo
        run: pixi global install hugo

      - name: Check Hugo version
        run: hugo version

      - name: Detect student workbook changes
        id: student_workbook
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=manual" >> "$GITHUB_OUTPUT"
            echo "手动触发构建：将根据 data/course_students_urls.xlsx 生成学员入口。"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "首次推送或无法比较历史：将根据 data/course_students_urls.xlsx 生成学员入口。"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -Fxq "data/course_students_urls.xlsx"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "检测到 data/course_students_urls.xlsx 有变化：将重新生成学员入口。"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "未检测到 data/course_students_urls.xlsx 变化；仍会在 Hugo 构建后刷新学员入口，保持 public 完整。"
          fi

      - name: Build HTML
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --gc --minify --cleanDestinationDir --noTimes --noChmod --destination public

      - name: Generate student redirects from workbook
        run: |
          echo "使用 data/course_students_urls.xlsx 生成学员英文上机入口。"
          python3 scripts/generate_student_redirects.py --input data/course_students_urls.xlsx --output public

      - name: Commit generated HTML
        run: |
          if [ -n "$(git status --porcelain -- public)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public
            git commit -m "Build Hugo HTML [skip ci]"
            git push
          else
            echo "No generated HTML changes."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload public folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
